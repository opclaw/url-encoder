<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Subtle pattern overlay -->
  <rect width="1200" height="630" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Icon circle -->
  <circle cx="600" cy="200" r="70" fill="rgba(255,255,255,0.15)" filter="url(#shadow)"/>
  
  <!-- Link icon (🔗) -->
  <text x="600" y="220" font-size="60" text-anchor="middle" fill="white">🔗</text>
  
  <!-- Title -->
  <text x="600" y="360" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="white" filter="url(#shadow)">URL Encoder</text>
  
  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.9)">Encode &amp; Decode URLs</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1100" cy="530" r="6" fill="rgba(255,255,255,0.2)"/>
  <circle cx="150" cy="550" r="3" fill="rgba(255,255,255,0.25)"/>
  <circle cx="1050" cy="120" r="5" fill="rgba(255,255,255,0.15)"/>
</svg>